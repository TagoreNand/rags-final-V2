name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: pip install ruff mypy pydantic pydantic-settings

      - name: ruff check
        run: ruff check backend/ --ignore E501,E402

      - name: ruff format (check only)
        run: ruff format backend/ --check

      - name: mypy (non-blocking)
        run: mypy backend/ --ignore-missing-imports --no-strict-optional || true

  # ── 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests with coverage
        run: |
          pytest backend/tests/ -v \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

  # ── 2b. Eval quality gate ────────────────────────────────────────────────────
  eval:
    name: Eval Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Retrieval + faithfulness gate (offline, deterministic)
        run: python -m backend.eval.harness --gate

      - name: Stage ablation + reflection A/B (report only)
        run: |
          python -m backend.eval.harness --compare --dim 64
          python -m backend.eval.harness --ablation

  # ── 3. Security scan ───────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety + bandit
        run: pip install safety bandit

      - name: safety check (dependency CVEs)
        run: safety check -r requirements.txt --full-report || true

      - name: bandit (source code SAST)
        run: bandit -r backend/ -ll -x backend/tests/ || true

  # ── 4. Build Docker images ─────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test, eval]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (Worker)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-worker
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Deploy to staging (on main push) ───────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://rag-ops-staging.yourdomain.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Update image tags in K8s manifests
        run: |
          IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          sed -i "s|yourregistry/rag-ops-api:latest|${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-api:${IMAGE_TAG}|g" \
            deploy/k8s/03-api.yaml
          sed -i "s|yourregistry/rag-ops-worker:latest|${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-worker:${IMAGE_TAG}|g" \
            deploy/k8s/04-worker.yaml

      - name: Apply K8s manifests
        run: |
          kubectl apply -f deploy/k8s/00-namespace-config.yaml
          kubectl apply -f deploy/k8s/01-redis.yaml
          kubectl apply -f deploy/k8s/02-ollama.yaml
          kubectl apply -f deploy/k8s/03-api.yaml
          kubectl apply -f deploy/k8s/04-worker.yaml
          kubectl apply -f deploy/k8s/05-rbac-network.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/rag-api -n rag-ops --timeout=120s
          kubectl rollout status deployment/rag-worker -n rag-ops --timeout=120s

      - name: Smoke test
        run: |
          sleep 10
          curl -sf https://rag-ops-staging.yourdomain.com/health | jq .

  # ── 6. Deploy to production (on release) ──────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://rag-ops.yourdomain.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig (prod)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Deploy release tag
        run: |
          IMAGE_TAG="${{ github.event.release.tag_name }}"
          kubectl set image deployment/rag-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-api:${IMAGE_TAG} \
            -n rag-ops
          kubectl set image deployment/rag-worker \
            worker=${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-worker:${IMAGE_TAG} \
            -n rag-ops
          kubectl rollout status deployment/rag-api -n rag-ops --timeout=180s
          kubectl rollout status deployment/rag-worker -n rag-ops --timeout=180s
