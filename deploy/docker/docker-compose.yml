version: "3.9"

services:

  # ── Ollama (local LLM) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Redis (job queue + caching) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RQ Dashboard (optional queue monitoring UI) ───────────────────────────
  rq-dashboard:
    image: eoranged/rq-dashboard:latest
    container_name: rag-rq-dashboard
    ports:
      - "9181:9181"
    environment:
      - RQ_DASHBOARD_REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── API server ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.api
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/data/rag.db
    volumes:
      - app_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── RQ Worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.worker
    container_name: rag-worker
    env_file:
      - ../../.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/data/rag.db
    volumes:
      - app_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2    # scale workers independently

  # ── OpenTelemetry Collector (optional) ────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: rag-otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318"   # OTLP HTTP
      - "4317:4317"   # OTLP gRPC
    restart: unless-stopped
    profiles:
      - observability  # only starts with --profile observability

volumes:
  ollama_data:
  redis_data:
  app_data:
